# ملف تكوين نظام رحلات مطار مسقط
# ====================================
# 
# هذا الملف يحتوي على جميع الإعدادات القابلة للتخصيص
# يمكن تعديل القيم حسب احتياجاتك

[DEFAULT]
# المنطقة الزمنية المحلية
timezone = Asia/Muscat

# فترة الانتظار بين المحاولات (بالثواني)
retry_delay = 3

[URLs]
# عنوان موقع المطار
base_url = https://www.muscatairport.co.om
# صفحة حالة الرحلات
arrival_url = https://www.muscatairport.co.om/flightstatusframe?type=1
departure_url = https://www.muscatairport.co.om/flightstatusframe?type=2
source_url = https://www.muscatairport.co.om/flightstatusframe?type=2

[Paths]
# مجلد حفظ البيانات
output_dir = flight_data

# أسماء الملفات
live_json = live_flights.json
archive_json = archive_flights.json
live_excel = live_flights.xlsx
archive_excel = archive_flights.xlsx
metadata = metadata.json

[Filters]
# عدد الساعات للرحلات "المباشرة" (24 = يوم كامل)
live_hours = 24

[Updates]
# فترة التحديث التلقائي (بالدقائق)
default_interval = 30

# الحد الأقصى لمدة محاولة الجلب (بالثواني)
fetch_timeout = 300

[Excel]
# تنسيق Excel
header_color = 366092
header_font_color = FFFFFF
header_font_size = 11

# عرض الأعمدة الافتراضي
column_width = 15

[Destinations]
# أسماء مستعارة للوجهات (للتوحيد)
# الصيغة: الاسم المستعار = الرمز الرسمي

LON = LHR
LONDON = LHR
LONDON HEATHROW = LHR
HEATHROW = LHR

DXB = DXB
DUBAI = DXB

DOH = DOH
DOHA = DOH

AUH = AUH
ABU DHABI = AUH

JED = JED
JEDDAH = JED

RUH = RUH
RIYADH = RUH

BAH = BAH
BAHRAIN = BAH

KWI = KWI
KUWAIT = KWI

[Airlines]
# أسماء مستعارة لشركات الطيران (اختياري)
# يمكن إضافة المزيد هنا

[Logging]
# مستوى السجلات (DEBUG, INFO, WARNING, ERROR)
log_level = INFO

# حفظ السجلات في ملف
log_to_file = True
log_file = logs/flight_manager.log

# تنسيق السجلات
log_format = %%(asctime)s [%%(levelname)s] %%(message)s
log_date_format = %%Y-%%m-%%d %%H:%%M:%%S

[Notifications]
# إرسال إشعارات (في المستقبل)
enable_notifications = False

# البريد الإلكتروني للإشعارات
# email = your@email.com

[Advanced]
# عدد المحاولات لكل استراتيجية جلب
max_retries = 3

# حفظ HTML الخام للتحليل
save_raw_html = False
raw_html_dir = flight_data/raw_html

# حد أقصى لحجم الأرشيف (عدد الرحلات)
# 0 = غير محدود
max_archive_size = 0

# حذف الرحلات القديمة تلقائياً (بالأيام)
# 0 = عدم الحذف
auto_delete_after_days = 0
