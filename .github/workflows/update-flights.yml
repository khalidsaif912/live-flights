name: Update live flights

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-live-flights
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Muscat Airport departures
        run: python scripts/fetch_flights.py

      - name: Commit updated flights
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update live flights data"
          file_pattern: data/report/flights.json data/report/flights_meta.json
