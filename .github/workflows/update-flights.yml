name: Update Muscat Flights Data

# متى يتم التشغيل
on:
  # جدولة تلقائية (كل 30 دقيقة)
  schedule:
    - cron: '*/30 * * * *'  # كل 30 دقيقة
    # أمثلة أخرى:
    # - cron: '*/15 * * * *'  # كل 15 دقيقة
    # - cron: '0 * * * *'     # كل ساعة
    # - cron: '0 */3 * * *'   # كل 3 ساعات
  
  # يمكن التشغيل يدوياً من GitHub
  workflow_dispatch:
  
  # التشغيل عند push (للاختبار)
  push:
    branches: [ main, master ]
    paths:
      - 'flight_manager.py'
      - '.github/workflows/update-flights.yml'

# الصلاحيات المطلوبة
permissions:
  contents: write  # للكتابة في المستودع

jobs:
  update-flights:
    runs-on: ubuntu-latest
    
    steps:
      # 1. استنساخ المستودع
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # للحصول على التاريخ الكامل
      
      # 2. إعداد Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # تخزين المكتبات مؤقتاً للسرعة
      
      # 3. تثبيت المتطلبات
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium
      
      # 4. تشغيل السكريبت الرئيسي
      - name: ✈️  Fetch and update flights data
        run: |
          python flight_manager.py
        continue-on-error: false  # إيقاف عند الخطأ
      
      # 5. التحقق من وجود تغييرات
      - name: 🔍 Check for changes
        id: check_changes
        run: |
          git add flight_data/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
          fi
      
      # 6. رفع التغييرات إلى GitHub
      - name: 📤 Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          
          # إحصائيات للـ commit message
          LIVE_COUNT=$(python -c "import json; print(len(json.load(open('flight_data/live_flights.json'))))" 2>/dev/null || echo "0")
          ARCHIVE_COUNT=$(python -c "import json; print(len(json.load(open('flight_data/archive_flights.json'))))" 2>/dev/null || echo "0")
          
          git commit -m "🔄 Auto-update flights data

          📊 Live flights: $LIVE_COUNT
          📚 Archive total: $ARCHIVE_COUNT
          🕐 Updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          🤖 via GitHub Actions"
          
          git push
      
      # 7. إنشاء تقرير ملخص
      - name: 📊 Generate summary
        if: always()
        run: |
          echo "## ✈️  Muscat Flights Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "flight_data/metadata.json" ]; then
            echo "### 📈 Statistics" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          with open('flight_data/metadata.json') as f:
              meta = json.load(f)
          print(f\"- **Status**: {meta.get('status', 'unknown')}\")
          print(f\"- **Live Flights**: {meta.get('liveFlightsCount', 0)}\")
          print(f\"- **Archive Total**: {meta.get('archiveFlightsCount', 0)}\")
          print(f\"- **Updated At**: {meta.get('updatedAt', 'N/A')}\")
          " >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh flight_data/ 2>/dev/null || echo "No data directory"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      
      # 8. رفع الملفات كـ artifacts (نسخة احتياطية)
      - name: 💾 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flight-data-${{ github.run_number }}
          path: |
            flight_data/*.json
            flight_data/*.xlsx
          retention-days: 30  # الاحتفاظ لمدة 30 يوم

# إشعارات عند الفشل (اختياري)
# يمكنك إضافة خطوة لإرسال إشعار بريد إلكتروني أو Slack
