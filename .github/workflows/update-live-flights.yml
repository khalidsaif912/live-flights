name: Update live flights

on:
  workflow_dispatch:
  schedule:
    # ─── التوقيتات بـ UTC (مسقط = UTC+4، نطرح 4 ساعات) ───────────────────
    #
    # المناوبة الأولى   06:00 - 15:00 مسقط
    - cron: "45 1 * * *"   # 05:45 مسقط — قبل بداية المناوبة
    - cron: "0  4 * * *"   # 08:00 مسقط — منتصف المناوبة
    - cron: "0  7 * * *"   # 11:00 مسقط — قرب النهاية
    #
    # المناوبة الثانية  13:00 - 22:00 مسقط
    - cron: "45 8  * * *"  # 12:45 مسقط — قبل بداية المناوبة
    - cron: "0  12 * * *"  # 16:00 مسقط — منتصف المناوبة
    - cron: "0  15 * * *"  # 19:00 مسقط — قرب النهاية
    #
    # المناوبة الثالثة  21:00 - 06:00 مسقط
    - cron: "45 16 * * *"  # 20:45 مسقط — قبل بداية المناوبة
    - cron: "0  22 * * *"  # 02:00 مسقط — منتصف الليل

permissions:
  contents: write

jobs:
  update-flights:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch live flights
        run: python scripts/fetch_flights.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/report/flights.json data/report/meta.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update live flights"
            git push
          fi
