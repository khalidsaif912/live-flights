name: Fetch Offload Report

on:
  workflow_dispatch:
  schedule:
    # كل 10 دقائق
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  fetch-offload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch offload report
        env:
          OFFLOAD_URL: ${{ secrets.OFFLOAD_URL }}
        run: python scripts/fetch_offload.py

      - name: Commit offload data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/offload/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "offload: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi
